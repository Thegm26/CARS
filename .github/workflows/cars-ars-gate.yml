name: CARS ARS Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  cars-ars-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run CARS ARS gate
        run: |
          python scripts/run_pr_ars_ci.py
