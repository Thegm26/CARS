name: CARS Correctness

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  cars-correctness:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run returns test suite
        run: |
          python -m unittest \
            tests.acceptance.test_returns_workflow \
            tests.regression.test_returns_regressions \
            tests.regression.test_returns_http
